name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

# Two lanes, chosen by the parity of the triggering comment/review id, so at
# most two Claude runs happen at once; any further triggers queue behind them.
# cancel-in-progress is false: a new comment must never abort a run already
# answering an earlier one.
concurrency:
  group: >-
    claude-${{
      (endsWith(format('{0}', github.event.comment.id || github.event.review.id), '0')
      || endsWith(format('{0}', github.event.comment.id || github.event.review.id), '2')
      || endsWith(format('{0}', github.event.comment.id || github.event.review.id), '4')
      || endsWith(format('{0}', github.event.comment.id || github.event.review.id), '6')
      || endsWith(format('{0}', github.event.comment.id || github.event.review.id), '8'))
      && 'lane-0' || 'lane-1'
    }}
  cancel-in-progress: false

env:
  # Pin the Playwright MCP server so the browser and server versions stay in
  # lockstep. Bump this to upgrade; the browser cache key tracks it.
  PLAYWRIGHT_MCP_VERSION: '0.0.77'

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') &&
        !contains(github.event.comment.body, '@claude review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        # Pin to the default branch: pull_request_review_comment/review events
        # would otherwise check out the PR merge ref (only issue_comment defaults
        # to the default branch). Kept as the first checkout so the trusted action
        # infra staged below comes from the default branch, never the PR branch.
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Stage action infra
        # Copy the action infra out of the repo *before* the PR branch is checked
        # out, so the PR-branch checkout can't remove or modify these files
        # (branches may predate them, and the system prompt must not come from an
        # untrusted PR branch). Referenced by absolute path in later steps.
        run: |
          cp .github/claude/reference-repos.md "${{ runner.temp }}/reference-repos.md"
          cp .github/claude/summary.js "${{ runner.temp }}/summary.js"

      - name: Checkout PR branch
        # Replace the working tree with the PR head so the reactor build (and
        # everything after) runs against the PR's code, matching the branch
        # claude-code-action checks out for Claude.
        if: github.event.issue.pull_request || github.event.pull_request
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number || github.event.pull_request.number }}/head
          fetch-depth: 1

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Build reactor
        if: github.event.issue.pull_request || github.event.pull_request
        # Install every component's implementation jar into the local Maven repo
        # from the PR branch, so later frontend/IT builds resolve all sibling
        # modules locally at the branch's @NpmPackage versions. Without this, a
        # partial build (e.g. `-pl <impl> -am`) leaves siblings to be pulled from
        # the remote snapshot repo at newer npm pins.
        run: mvn install -B -T 1C -Dmaven.test.skip=true -Drelease

      - name: Install TestBench license
        if: env.TB_LICENSE != ''
        env:
          TB_LICENSE: ${{ secrets.TB_LICENSE }}
        run: |
          mkdir -p ~/.vaadin
          user="${TB_LICENSE%%/*}"
          key="${TB_LICENSE#*/}"
          echo "{\"username\":\"${user}\",\"proKey\":\"${key}\"}" > ~/.vaadin/proKey

      - name: Clone upstream references (read-only context)
        run: |
          git clone --depth 1 https://github.com/vaadin/flow.git \
            "${{ runner.temp }}/reference/flow"
          git clone --depth 1 https://github.com/vaadin/web-components.git \
            "${{ runner.temp }}/reference/web-components"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-mcp-${{ env.PLAYWRIGHT_MCP_VERSION }}

      - name: Install Chromium for Playwright MCP
        # Install the exact browser build the pinned MCP's playwright-core
        # expects, so the server never fails to find a matching browser.
        run: |
          core_version=$(npm view "@playwright/mcp@${PLAYWRIGHT_MCP_VERSION}" dependencies.playwright-core)
          npx --yes "playwright@${core_version}" install --with-deps chromium

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Setting a prompt on comment events would switch the action into
          # agent mode (no tracking comment); track_progress forces tag mode
          # back. It has no other effect (see src/modes/detector.ts).
          track_progress: true
          # The action's tag-mode prompt only contains the trigger comment's
          # body, with no link to the review thread it replies to — a reply
          # like "@claude fix this" is ambiguous and Claude tends to fix ALL
          # review comments. Inject the thread anchor (file, line, comment
          # ids) from the webhook payload so the run is scoped to the one
          # thread that triggered it. Empty (no-op) for other event types.
          prompt: >-
            ${{ github.event_name == 'pull_request_review_comment' &&
            format('SCOPE: You were triggered by review comment id {0} in a single
            review thread on file `{1}`{2}{3}. Find that thread in the review comments
            above and address ONLY the issue discussed in it. All other review comments
            and threads are background context — do not fix them unless the trigger
            comment explicitly asks you to.',
            github.event.comment.id,
            github.event.comment.path,
            github.event.comment.original_line && format(' (line {0})', github.event.comment.original_line) || '',
            github.event.comment.in_reply_to_id && format(', in reply to comment id {0}', github.event.comment.in_reply_to_id) || '') || '' }}
          additional_permissions: |
            actions: read
          # Extra working directories go through settings instead of --add-dir:
          # the action's claude_args parser takes only a single value per
          # --add-dir flag and overwrites repeated flags, silently dropping all
          # but one directory (see base-action/src/parse-sdk-options.ts).
          settings: |
            {
              "permissions": {
                "additionalDirectories": [
                  "${{ runner.temp }}/reference/flow",
                  "${{ runner.temp }}/reference/web-components"
                ]
              }
            }
          claude_args: |
            --append-system-prompt-file ${{ runner.temp }}/reference-repos.md
            --mcp-config '{"mcpServers":{"playwright":{"command":"npx","args":["@playwright/mcp@${{ env.PLAYWRIGHT_MCP_VERSION }}","--headless","--isolated"]}}}'
            --allowedTools "mcp__playwright,WebFetch,WebSearch,Bash(mvn:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git branch:*),Bash(git add:*),Bash(git commit:*),Bash(git checkout:*),Bash(git restore:*),Bash(git stash:*),Bash(cd:*),Bash(npm install),Bash(npm ci),Bash(node scripts/wtr.js:*),Bash(node scripts/computeModules.js:*),Bash(scripts/checkstyle.sh:*),Bash(./scripts/checkstyle.sh:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(rg:*),Bash(head:*),Bash(tail:*),Bash(sed:*),Bash(wc:*),Bash(echo:*)"
            --disallowedTools "Bash(mvn deploy:*)"

      - name: Summarize Claude session
        if: always() && steps.claude.outputs.execution_file != ''
        run: node "${{ runner.temp }}/summary.js" "${{ steps.claude.outputs.execution_file }}"

      - name: Upload Claude execution log
        # The execution_file is the full stream-json trace: every tool_use with
        # its input and every tool_result. Off by default because on a public
        # repo the artifact is world-readable; set the CLAUDE_DEBUG repository
        # variable to 'true' to capture it when debugging a run's tool calls.
        if: always() && vars.CLAUDE_DEBUG == 'true' && steps.claude.outputs.execution_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.claude.outputs.execution_file }}
          retention-days: 7
