name: Claude Code Review

# Dedicated code-review lane. Triggered by a "@claude review" PR comment or
# manually via workflow_dispatch. The phrase keeps the real "@claude" mention
# so the installed Claude GitHub app still reacts to the comment; the generic
# "@claude" workflow explicitly excludes it. Substring caveat: comments like
# "@claude reviewed ..." or "@claude reviewing ..." also match and land here.
#
# Runs the claude-code-action in agent mode (explicit prompt, so no tracking
# comment is posted). The prompt is a single /pr-review invocation: the
# prepare-review.js step pre-computes a deterministic review scope and writes an
# overview file, and the /pr-review command (.claude/commands/pr-review.md) does
# the find/verify/triage/post harness against it. All comments are posted as
# claude[bot] via the same app token the generic workflow uses.

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr:
        description: 'Pull request number to review'
        required: true
        type: string

# One review per PR at a time; a re-trigger queues instead of aborting a run
# that may be mid-posting.
concurrency:
  group: claude-review-${{ github.event.issue.number || inputs.pr }}
  cancel-in-progress: false

env:
  PR_NUMBER: ${{ github.event.issue.number || inputs.pr }}

jobs:
  review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@claude review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        # Default branch first, so the trusted action infra staged below never
        # comes from the PR branch.
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Stage action infra
        # Copy infra out of the repo *before* the PR branch is checked out, so
        # the PR-branch checkout can't modify these files. The command itself
        # (.claude/commands/pr-review.md) needs no staging: github-claude-action
        # restores the whole .claude tree from the PR base before running.
        run: |
          cp .github/claude/system-prompt.md "${{ runner.temp }}/system-prompt.md"
          cp .github/claude/summary.js "${{ runner.temp }}/summary.js"
          cp .github/claude/prepare-review.js "${{ runner.temp }}/prepare-review.js"

      - name: Checkout PR branch
        # The review investigates related code in the PR head tree.
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head
          fetch-depth: 1

      - name: Prepare review scope
        # Pre-compute everything the review needs so the command never has to
        # derive it: the exact diff as GitHub renders it, the changed-file list,
        # the PR metadata, a browsable checkout of the merge-base, and an
        # overview file that points at each input by absolute path. The overview
        # path is the single argument passed to /pr-review.
        env:
          GH_TOKEN: ${{ github.token }}
        run: node "${{ runner.temp }}/prepare-review.js" "$PR_NUMBER"

      - name: Clone upstream references (read-only context)
        run: |
          git clone --depth 1 https://github.com/vaadin/flow.git \
            "${{ runner.temp }}/reference/flow"
          git clone --depth 1 https://github.com/vaadin/web-components.git \
            "${{ runner.temp }}/reference/web-components"

      - name: Run Claude Code review
        id: claude
        uses: anthropics/claude-code-action@v1
        # CLAUDE_CODE_DISABLE_BACKGROUND_TASKS forces synchronous subagent
        # dispatch. Without it the Agent tool may launch subagents in the
        # background (nondeterministic, feature-flag driven); the headless
        # session then ends while they are still running and the review is
        # silently lost — job green, no comments posted. The CLI (2.1.198)
        # checks this variable directly in the dispatch decision, so with it
        # set every subagent runs inline; batched Agent calls still run in
        # parallel. A step-level env reaches the CLI because the base action
        # spawns it with a copy of its own process env.
        env:
          CLAUDE_CODE_DISABLE_BACKGROUND_TASKS: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Extra working directories go through settings instead of --add-dir:
          # the action's claude_args parser takes only a single value per
          # --add-dir flag and overwrites repeated flags, silently dropping all
          # but one directory (see base-action/src/parse-sdk-options.ts).
          settings: |
            {
              "permissions": {
                "additionalDirectories": [
                  "${{ runner.temp }}/pr-review",
                  "${{ runner.temp }}/reference/flow",
                  "${{ runner.temp }}/reference/web-components",
                  "/tmp"
                ]
              }
            }
          # A single slash-command invocation. The command lives at
          # .claude/commands/pr-review.md and is restored from the PR base by the
          # action before running; the CLI expands it in headless mode. Its only
          # argument is the overview file written by the prepare step, which
          # points at every review input by absolute path.
          prompt: /pr-review ${{ runner.temp }}/pr-review/overview.md
          claude_args: |
            --append-system-prompt-file ${{ runner.temp }}/system-prompt.md
            --permission-mode acceptEdits
            --allowedTools "Skill,Task,ReportFindings,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git branch:*),Bash(cd:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(rg:*),Bash(head:*),Bash(tail:*),Bash(sed:*),Bash(wc:*),Bash(echo:*)"

      - name: Summarize Claude session
        if: always() && steps.claude.outputs.execution_file != ''
        run: node "${{ runner.temp }}/summary.js" "${{ steps.claude.outputs.execution_file }}"

      - name: Upload Claude execution log
        # See claude.yml for why this is gated behind the CLAUDE_DEBUG variable.
        if: always() && vars.CLAUDE_DEBUG == 'true' && steps.claude.outputs.execution_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.claude.outputs.execution_file }}
          retention-days: 7
