name: Claude Code Review

# Dedicated code-review lane. Triggered by a "@claude review" PR comment or
# manually via workflow_dispatch. The phrase keeps the real "@claude" mention
# so the installed Claude GitHub app still reacts to the comment; the generic
# "@claude" workflow explicitly excludes it. Substring caveat: comments like
# "@claude reviewed ..." or "@claude reviewing ..." also match and land here.
#
# Runs the claude-code-action in agent mode (explicit prompt, so no tracking
# comment is posted). The launching agent does almost nothing: it runs the
# custom `pr-review` workflow (.claude/workflows/pr-review.js) against a
# pre-computed, deterministic review scope, then posts the workflow's
# already-rendered output verbatim — one summary comment plus one inline comment
# per finding. The workflow finds defects intent-blind, judges each once against
# both the code and the PR's stated intent (so a real-but-intended change is
# dropped in the same pass, no separate triage), and assembles the exact comment
# text itself, leaving no formatting decisions to the agent. All comments are
# posted as claude[bot] via the same app token the generic workflow uses.

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr:
        description: 'Pull request number to review'
        required: true
        type: string

# One review per PR at a time; a re-trigger queues instead of aborting a run
# that may be mid-posting.
concurrency:
  group: claude-review-${{ github.event.issue.number || inputs.pr }}
  cancel-in-progress: false

env:
  PR_NUMBER: ${{ github.event.issue.number || inputs.pr }}

jobs:
  review:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@claude review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        # Default branch first, so the trusted action infra staged below never
        # comes from the PR branch.
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Stage action infra
        run: |
          cp .github/claude/system-prompt.md "${{ runner.temp }}/system-prompt.md"
          cp .github/claude/summary.js "${{ runner.temp }}/summary.js"

      - name: Checkout PR branch
        # The review investigates related code in the PR head tree.
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ env.PR_NUMBER }}/head
          fetch-depth: 1

      - name: Prepare review scope
        # Pre-compute everything the review needs so the skill never has to
        # derive it: the exact diff as GitHub renders it, the changed-file
        # list, the PR metadata, and a browsable checkout of the merge-base
        # (the pre-change state, resolved by the compare API regardless of
        # local history or where the PR's base branch has moved since).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scope_dir="${RUNNER_TEMP}/pr-review"
          mkdir -p "$scope_dir"

          gh pr diff "$PR_NUMBER" > "$scope_dir/pr.diff"
          gh pr diff "$PR_NUMBER" --name-only > "$scope_dir/pr-files.txt"
          gh pr view "$PR_NUMBER" \
            --json title,body,author,labels,baseRefName,headRefName \
            > "$scope_dir/pr-meta.json"

          head_sha=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          base_ref_sha=$(gh pr view "$PR_NUMBER" --json baseRefOid --jq .baseRefOid)
          base_sha=$(gh api "repos/${GITHUB_REPOSITORY}/compare/${base_ref_sha}...${head_sha}" \
            --jq .merge_base_commit.sha)

          git fetch --depth=1 origin "$base_sha"
          git worktree add "$scope_dir/base" "$base_sha"

      - name: Clone upstream references (read-only context)
        run: |
          git clone --depth 1 https://github.com/vaadin/flow.git \
            "${{ runner.temp }}/reference/flow"
          git clone --depth 1 https://github.com/vaadin/web-components.git \
            "${{ runner.temp }}/reference/web-components"

      - name: Run Claude Code review
        id: claude
        uses: anthropics/claude-code-action@v1
        # CLAUDE_CODE_DISABLE_BACKGROUND_TASKS forces synchronous subagent
        # dispatch. Without it subagents may launch in the background
        # (nondeterministic, feature-flag driven); the headless session then
        # ends while they are still running and the review is silently lost —
        # job green, no comments posted. The pr-review workflow fans out its
        # finder/judge subagents via the Agent tool, so the same guarantee is
        # needed: with this set every subagent runs inline while batched calls
        # still run in parallel. A step-level env reaches the CLI because the
        # base action spawns it with a copy of its own process env.
        #
        # NOTE: verify on the first run that the Workflow tool call itself is
        # awaited to completion in this headless session (its result must reach
        # Step 2). If the run ends before the workflow returns, the fallback is
        # a synchronous-Agent skill with the same phases instead of a workflow.
        env:
          CLAUDE_CODE_DISABLE_BACKGROUND_TASKS: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Extra working directories go through settings instead of --add-dir:
          # the action's claude_args parser takes only a single value per
          # --add-dir flag and overwrites repeated flags, silently dropping all
          # but one directory (see base-action/src/parse-sdk-options.ts).
          settings: |
            {
              "permissions": {
                "additionalDirectories": [
                  "${{ runner.temp }}/pr-review",
                  "${{ runner.temp }}/reference/flow",
                  "${{ runner.temp }}/reference/web-components",
                  "/tmp"
                ]
              }
            }
          prompt: |
            Review pull request #${{ env.PR_NUMBER }} and deliver the result as PR comments.
            Do not read the diff or any source files yourself — the pr-review workflow
            gathers and judges everything. Your only jobs are to launch it and post what
            it returns.

            ## Step 1 — Run the review workflow
            As your first action, invoke the Workflow tool with the `pr-review` workflow,
            passing this exact args object (the pre-computed review scope):

            Workflow({ name: "pr-review", args: {
              "pr": "${{ env.PR_NUMBER }}",
              "diff": "${{ runner.temp }}/pr-review/pr.diff",
              "files": "${{ runner.temp }}/pr-review/pr-files.txt",
              "meta": "${{ runner.temp }}/pr-review/pr-meta.json",
              "base": "${{ runner.temp }}/pr-review/base",
              "head": "${{ github.workspace }}",
              "references": ["${{ runner.temp }}/reference/flow", "${{ runner.temp }}/reference/web-components"]
            } })

            Wait for the workflow to finish. It has already found, judged (against the
            PR's intent), and rendered everything. Its return value contains two
            ready-to-post fields:
            - `summaryMarkdown`: the full body of the summary comment.
            - `inlineComments`: an array of `{ path, line, body }`, each ready to post.

            ## Step 2 — Post (mechanical — post verbatim, change nothing)
            Do not re-review, re-investigate, reclassify, reword, reformat, or add to the
            workflow's output. Post it exactly as given:
            - Write `summaryMarkdown` to a file and post it as one PR comment:
              `gh pr comment ${{ env.PR_NUMBER }} --body-file <file>`.
            - For each entry in `inlineComments`, call
              mcp__github_inline_comment__create_inline_comment with its `path`, `line`,
              and `body` verbatim (confirmed: true).
            - The comments are the deliverable — do not output the review as response text.
          claude_args: |
            --append-system-prompt-file ${{ runner.temp }}/system-prompt.md
            --permission-mode acceptEdits
            --allowedTools "Workflow,Task,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git branch:*),Bash(cd:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(grep:*),Bash(rg:*),Bash(head:*),Bash(tail:*),Bash(sed:*),Bash(wc:*),Bash(echo:*)"

      - name: Summarize Claude session
        if: always() && steps.claude.outputs.execution_file != ''
        run: node "${{ runner.temp }}/summary.js" "${{ steps.claude.outputs.execution_file }}"

      - name: Upload Claude execution log
        # See claude.yml for why this is gated behind the CLAUDE_DEBUG variable.
        if: always() && vars.CLAUDE_DEBUG == 'true' && steps.claude.outputs.execution_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-execution-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.claude.outputs.execution_file }}
          retention-days: 7
