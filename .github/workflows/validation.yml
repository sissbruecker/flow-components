name: Validation

on:
  workflow_dispatch:
    inputs:
      components:
        description: 'Space-separated component names (e.g. "grid combo-box"), empty for all'
        required: false
        default: ''

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: true

env:
  FORK_COUNT: 4

jobs:
  validation:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 146
          install-chromedriver: true

      - name: Set Maven args
        run: |
          args="-ntp -B"
          echo "MAVEN_ARGS=$args" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          fetch-depth: ${{ github.event_name == 'merge_group' && 50 || 1 }}

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install TestBench license
        if: env.TB_LICENSE != ''
        env:
          TB_LICENSE: ${{ secrets.TB_LICENSE }}
        run: |
          mkdir -p ~/.vaadin
          echo "$TB_LICENSE" > ~/.vaadin/proKey

      - name: Show environment info
        run: |
          java -version
          mvn -version
          node --version
          npm --version

      - name: Build
        run: |
          elements="${{ github.event.inputs.components || '' }}"
          it_module="vaadin-$elements-flow-parent/vaadin-$elements-flow-integration-tests"
          echo "IT_MODULE=$it_module" >> "$GITHUB_ENV"

          mvn install -am -pl "$it_module" \
            $MAVEN_ARGS -DskipTests -DskipUnitTests -DskipJetty -DskipFrontend \
            -Dvaadin.pnpm.enable

          mvn com.vaadin:flow-maven-plugin:build-frontend package -pl "$it_module" \
            $MAVEN_ARGS -DskipTests -DskipUnitTests -DskipJetty \
            -Dvaadin.pnpm.enable -Dvaadin.productionMode -Dvaadin.force.production.build=true

      - name: Start Jetty
        run: |
          mvn jetty:run-war -pl "$IT_MODULE" \
            $MAVEN_ARGS -DskipFrontend -Dvaadin.productionMode &
          timeout 120 bash -c 'until curl -sf -o /dev/null http://localhost:8080; do sleep 2; done'

      - name: Run Failsafe
        run: |
          mvn failsafe:integration-test failsafe:verify -pl "$IT_MODULE" \
            $MAVEN_ARGS -DskipJetty \
            -Dfailsafe.rerunFailingTestsCount=2 \
            -Dfailsafe.forkCount=$FORK_COUNT \
            -Dcom.vaadin.testbench.Parameters.testsInParallel=1

      - name: Stop Jetty
        if: always()
        run: |
          mvn jetty:stop -pl "$IT_MODULE" $MAVEN_ARGS
